name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation structure
        run: ./scripts/doc-check.sh

      - name: Architecture lint
        run: ./scripts/arch-lint.sh

      - name: Quality scan
        run: ./scripts/quality-scan.sh

