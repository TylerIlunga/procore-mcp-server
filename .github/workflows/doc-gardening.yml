name: Doc Gardening

# Runs weekly to check for stale documentation
# Inspired by the article's "recurring doc-gardening agent" pattern

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-docs:
    name: Documentation Freshness Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for date checking

      - name: Check documentation freshness
        run: |
          echo "=== Documentation Freshness Report ==="
          echo ""
          echo "Files not updated in the last 30 days:"
          echo ""
          find docs -name "*.md" -type f | while read -r file; do
            last_modified=$(git log -1 --format="%ai" -- "$file" 2>/dev/null || echo "unknown")
            if [ "$last_modified" != "unknown" ]; then
              days_ago=$(( ($(date +%s) - $(date -d "$last_modified" +%s 2>/dev/null || date -j -f "%Y-%m-%d %H:%M:%S %z" "$last_modified" +%s 2>/dev/null || echo 0)) / 86400 ))
              if [ "$days_ago" -gt 30 ]; then
                echo "  STALE ($days_ago days): $file"
              fi
            fi
          done

      - name: Validate doc structure
        run: ./scripts/doc-check.sh
